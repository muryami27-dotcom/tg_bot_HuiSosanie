```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кликер</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    background:#1a1a2e;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.score{
    font-size:42px;
    margin-bottom:40px;
}

button{
    width:180px;
    height:180px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:24px;
    background:#e94560;
    color:white;
}
</style>
</head>
<body>

<h2>Ты насосала:</h2>

<div class="score">
🍆 <span id="score">0</span>
</div>

<button id="clickBtn">пососать</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const SERVER_URL = "https://hui-clicker-bot.vercel.app";

const userId = tg.initDataUnsafe?.user?.id || 0;
const firstName = tg.initDataUnsafe?.user?.first_name || "Аноним";

let score = 0;
let pendingClicks = 0;

const scoreEl = document.getElementById("score");
const btn = document.getElementById("clickBtn");

async function loadScore() {
    try {
        const response = await fetch(
            `${SERVER_URL}/get_score?user_id=${userId}`
        );

        const data = await response.json();

        score = data.clicks || 0;
        scoreEl.textContent = score;
    } catch(err) {
        console.error(err);
    }
}

loadScore();

btn.addEventListener("click", () => {
    score++;
    pendingClicks++;

    scoreEl.textContent = score;

    if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("medium");
    }
});

async function sendClicks() {

    if (pendingClicks <= 0) return;

    const batch = pendingClicks;
    pendingClicks = 0;

    try {

        await fetch(`${SERVER_URL}/click`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                user_id:userId,
                name:firstName,
                count:batch
            })
        });

        console.log(`Отправлено ${batch}`);

    } catch(err) {

        pendingClicks += batch;
        console.error(err);

    }
}

setInterval(sendClicks, 2000);

window.addEventListener("beforeunload", sendClicks);
</script>

</body>
</html>
```
