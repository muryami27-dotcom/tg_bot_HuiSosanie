<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прикольный Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .score-container {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .click-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff477e, #b7094c);
            border: none;
            box-shadow: 0 10px 25px rgba(183, 9, 76, 0.6), 
                        inset 0 4px 10px rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 50px;
            transition: transform 0.1s ease;
            outline: none;
        }
        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(183, 9, 76, 0.4);
        }
    </style>
</head>
<body>

    <h1>Твой баланс</h1>
    <div class="score-container">🪙 <span id="score">0</span></div>

    <button class="click-btn" id="clickerBtn">🐾</button>

    <script>
        // Инициализируем Телеграм Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно на максимум

        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const clickBtn = document.getElementById('clickerBtn');

        // Логика клика
        clickBtn.addEventListener('click', () => {
            score++;
            scoreDisplay.textContent = score;
            
            // Легкая вибрация на телефоне при клике (если поддерживается)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });
    </script>
</body>
</html>
