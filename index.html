<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер сосания хуёв</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .score-container {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .click-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(145deg, #ff477e, #b7094c);
            border: none;
            box-shadow: 0 10px 25px rgba(183, 9, 76, 0.6);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease;
        }
        .click-btn:active {
            transform: scale(1.2);
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.8);
        }
    </style>
</head>
<body>

    <h1>Ты насосала:</h1>
    <div class="score-container">🍆 <span id="score">0</span></div>

    <button class="click-btn" id="clickerBtn">пососать</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Достаем старые клики, если они были сохранены в памяти телефона
        let savedScore = parseInt(localStorage.getItem('unsaved_clicks')) || 0;

        // МАГИЯ: Если при открытии у нас есть сохраненные клики, отправляем их боту
        if (savedScore > 0) {
            tg.sendData(savedScore.toString());
            localStorage.removeItem('unsaved_clicks'); // Очищаем память, так как боту уже передали
            savedScore = 0;
        }

        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const clickBtn = document.getElementById('clickerBtn');

        clickBtn.addEventListener('click', () => {
            score++;
            scoreDisplay.textContent = score;

            // Записываем каждый клик в память телефона на случай, если игру закроют крестиком
            localStorage.setItem('unsaved_clicks', score.toString());
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
